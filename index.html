    <!-- Enhanced Mobile CSS for iPhone -->
    <style>
      /* Force iPhone to recognize as mobile */
      @supports (-webkit-touch-callout: none) {
        /* iPhone specific styles */
        html {
          width: 100vw !important;
          max-width: 100vw !important;
          overflow-x: hidden !important;
        }
        
        body {
          width: 100vw !important;
          max-width: 100vw !important;
          overflow-x: hidden !important;
          -webkit-text-size-adjust: 100%;
          text-size-adjust: 100%;
        }
        
        #root {
          width: 100vw !important;
          max-width: 100vw !important;
          overflow-x: hidden !important;
        }
        
        /* Force mobile menu to show on iPhone */
        @media screen and (max-width: 1279px) {
          .xl\\:hidden {
            display: block !important;
          }
          
          .hidden.xl\\:flex {
            display: none !important;
          }
        }
      }
      
      html, body {
        font-size: 16px;
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        /* iPhone specific fixes */
        -webkit-overflow-scrolling: touch;
        position: relative;
      }
      
      /* Fix iPhone viewport issues */
      * {
        box-sizing: border-box;
        max-width: 100%;
      }
      
      input, textarea, select {
        font-size: 16px;
        -webkit-appearance: none;
        border-radius: 0;
      }
      
      #root {
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden;
        min-height: 100vh;
        position: relative;
      }
      
      /* Prevent horizontal scrolling on iPhone */
      body, html {
        position: relative;
        overflow-x: hidden;
      }
      
      /* Force mobile layout on devices under 1280px */
      @media screen and (max-width: 1279px) {
        .container {
          padding-left: 1rem !important;
          padding-right: 1rem !important;
          max-width: 100% !important;
        }
        
        /* Ensure mobile menu shows */
        nav.hidden {
          display: none !important;
        }
        
        button[aria-label*="menu"] {
          display: block !important;
        }
      }
    </style>

  <body>
    <div id="root"></div>
    <!-- Unregister old service workers to avoid stale caches from previous PWA builds -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(reg => reg.unregister());
        }).catch(() => {/* ignore */});
      }
    </script>
