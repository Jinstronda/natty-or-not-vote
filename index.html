    <!-- iPhone orientation change fix script -->
    <script>
      // Fix iPhone Safari orientation change viewport bug
      if (/(iPad|iPhone|iPod)/g.test(navigator.userAgent)) {
        
        // Prevent zoom on orientation change
        window.addEventListener('orientationchange', function() {
          var viewport = document.querySelector("meta[name=viewport]");
          if (viewport) {
            var content = viewport.getAttribute("content");
            viewport.setAttribute("content", content + ", maximum-scale=1.0");
            setTimeout(function () {
              viewport.setAttribute("content", content);
            }, 100);
          }
        }, false);
        
        // Force viewport height recalculation
        function fixViewport() {
          document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
          
          // Force reflow to ensure layout recalculation
          document.body.style.height = window.innerHeight + 'px';
          setTimeout(function() {
            document.body.style.height = '';
          }, 100);
        }
        
        // Apply fixes
        window.addEventListener('resize', fixViewport);
        window.addEventListener('orientationchange', function() {
          setTimeout(fixViewport, 100);
        });
        
        // Initial fix
        fixViewport();
        
        // Additional iPhone-specific fixes
        document.addEventListener('DOMContentLoaded', function() {
          // Disable iOS Safari pull-to-refresh
          document.body.style.overscrollBehavior = 'none';
          
          // Force minimum font size on all text inputs
          var inputs = document.querySelectorAll('input, textarea, select');
          inputs.forEach(function(input) {
            input.style.fontSize = '16px';
          });
        });
      }
    </script>
