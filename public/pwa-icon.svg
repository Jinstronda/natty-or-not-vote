<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with natty green gradient -->
  <defs>
    <linearGradient id="nattyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="256" cy="256" r="240" fill="url(#nattyGradient)" stroke="#fff" stroke-width="8"/>
  
  <!-- Dumbbell icon -->
  <g fill="#ffffff" stroke="#ffffff" stroke-width="2">
    <!-- Left weight -->
    <rect x="100" y="200" width="40" height="112" rx="8"/>
    <!-- Right weight -->
    <rect x="372" y="200" width="40" height="112" rx="8"/>
    <!-- Left connector -->
    <rect x="140" y="235" width="50" height="42" rx="4"/>
    <!-- Right connector -->
    <rect x="322" y="235" width="50" height="42" rx="4"/>
    <!-- Center bar -->
    <rect x="190" y="248" width="132" height="16" rx="8"/>
  </g>
  
  <!-- Text "N" for Natty -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="120" font-weight="bold" 
        text-anchor="middle" fill="#ffffff">N</text>
</svg> 